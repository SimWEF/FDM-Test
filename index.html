<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FDM Maintenance</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f4f6f8;
}

/* ✅ conteneur mobile full width */
.container {
  width: 70%;
}

/* titre */
h2 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 5px;
}

/* info */
.info {
  text-align: center;
  color: red;
  font-size: 12px;
}

/* ✅ ligne propre */
.row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
}

/* ✅ label */
.label {
  width: 15%;
  font-size: 14px;
  font-weight: bold;
}

/* ✅ champ */
.field {
  width: 85%;
  position: relative;
}

/* ✅ champs plus petits */
.field.small {
  max-width: 150px;
}

input.small {
  max-width: 150px;
}

/* ✅ champ moyen */
input.medium {
  max-width: 250px;
}


/* ✅ inputs propres */
input, textarea, select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* textarea */
textarea {
  min-height: 80px;
  resize: none;
}

/* ✅ bouton principal */
.btn-main {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  font-size: 16px;
  background: #0078D7;
  color: white;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

/* ✅ boutons matériel horizontaux */
.btn-group-horizontal {
  display: flex;
  gap: 6px;
}

.btn-group-horizontal button {
  flex: 1;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #f0f0f0;
}

.btn-group-horizontal button.active {
  background-color: #0078D7;
  color: white;
  border-color: #0078D7;
}

/* ✅ dropdown propre (fix du bug visuel) */
.dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  max-height: 160px;
  overflow-y: auto;
  display: none;
  z-index: 1000;
}

.dropdown div {
  padding: 10px;
  font-size: 14px;
}

.dropdown div:hover {
  background: #e6f2ff;
}

</style>
</head>

<body>

<div class="container">

<h2>🔧 Fiches de Maintenance</h2>
<p class="info">* obligatoires</p>

<div class="row">
  <div class="label">Equipement *</div>
  <div class="field">
    
  <input type="text" style="display:none">
  
    <input 
      type="text"
      id="equipement"
      name="random_12345_equipement"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >

    <div id="equipementList" class="dropdown"></div>
  </div>
</div>

<div class="row">
  <div class="label">Description *</div>
  <div class="field">
    <textarea id="description"></textarea>
  </div>
</div>

<div class="row">
  <div class="label">Date *</div>
  <div class="field">
    <input type="date" id="date" class="small">
  </div>
</div>

<div class="row">
  <div class="label">Site *</div>
    <div class="field small">
    <input type="text" style="display:none">
      <input 
        type="text"
        id="site"
        name="random_12345_site"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
    <div id="siteList" class="dropdown"></div>
  </div>
</div>

<div class="row">
  <div class="label">Matériel Utilisable?*</div>
  <div class="field">

    <div class="btn-group-horizontal">
      <button type="button" onclick="selectMateriel('Oui', this)">Oui</button>
      <button type="button" onclick="selectMateriel('Oui en mode dégradé', this)">Oui en mode dégradé</button>
      <button type="button" onclick="selectMateriel('Non', this)">Non</button>
    </div>

    <input type="hidden" id="materiel">
  </div>
</div>

<div class="row">
  <div class="label">Action immédiate</div>
  <div class="field">
    <textarea id="action1"></textarea>
  </div>
</div>

<div class="row">
  <div class="label">Action à effectuer</div>
  <div class="field">
    <textarea id="action2"></textarea>
  </div>
</div>

<div class="row">
  <div class="label">Rédacteur *</div>
  <div class="field">
    <input type="text" id="redacteur" class="medium">
  </div>
</div>

<button class="btn-main" onclick="envoyer()">✅ Envoyer</button>

</div>

<script>

// Ignorer accents
function normalize(str) {
return str
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");
}

//Fuzzy

function fuzzyMatch(search, text) {

  if (!search) return true;

  const s = search;
  const t = text;

  let i = 0;
  let j = 0;
  let errors = 0;

  while (i < s.length && j < t.length) {

    if (s[i] === t[j]) {
      i++;
      j++;
    } else {
      errors++;
      j++;
    }

    if (errors > 2) return false;
  }

  // ✅ important : accepter même si fin différente
  return i >= s.length - 1;
}



// ✅ globals
let equipements = [];
let sites = [];

// ✅ sélection matériel
function selectMateriel(value, element) {
  document.getElementById("materiel").value = value;

  document.querySelectorAll(".btn-group-horizontal button")
    .forEach(btn => btn.classList.remove("active"));

  element.classList.add("active");
}

// ✅ AUTOCOMPLETE
function createAutocomplete(inputId, listId, dataList) {

  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  input.addEventListener("focus", () => showList(""));
  input.addEventListener("input", () => showList(input.value));

function showList(filter) {

  const val = normalize(filter).trim();

  let results = dataList.map(item => {

    const normalized = normalize(item);

    let score = 0;

    if (!val) score = 1;

    // ✅ priorité forte : commence par
    else if (normalized.startsWith(val)) score = 100;

    // ✅ contient direct
    else if (normalized.includes(val)) score = 70;

    // ✅ fuzzy léger (secours uniquement)
    else if (fuzzyMatch(val, normalized)) score = 40;

    return {
      original: item,
      score: score
    };

  });

  // ✅ filtrer les vrais résultats uniquement
  results = results.filter(r => r.score > 0);

  // ✅ trier par score
  results.sort((a, b) => b.score - a.score);

  // limiter
  results = results.slice(0, 50);

  if (results.length === 0) {
    list.innerHTML = "<div>Aucun résultat</div>";
  } else {
    list.innerHTML = results.map(item => `
      <div onclick="selectItem('${item.original.replace(/'/g, "\\'")}', '${inputId}', '${listId}')">
        ${item.original}
      </div>
    `).join("");
  }

  list.style.display = "block";
}
}

// ✅ sélection item
function selectItem(value, inputId, listId) {
  document.getElementById(inputId).value = value;
  document.getElementById(listId).style.display = "none";
}

// ✅ charger données
Promise.all([
  fetch("equipements.json").then(res => res.json()),
  fetch("sites.json").then(res => res.json())
]).then(([equipData, siteData]) => {

  equipements = equipData;
  sites = siteData;

  createAutocomplete("equipement", "equipementList", equipements);
  createAutocomplete("site", "siteList", sites);
});

// ✅ fermer dropdown
document.addEventListener("click", function(e) {
  if (!e.target.closest(".field")) {
    document.querySelectorAll(".dropdown")
      .forEach(d => d.style.display = "none");
  }
});

// ✅ auto date
window.onload = function() {
  document.getElementById("date").valueAsDate = new Date();
};

// ✅ ENVOI
function envoyer() {

  const equipement = document.getElementById("equipement").value;
  const description = document.getElementById("description").value;
  const date = document.getElementById("date").value;
  const site = document.getElementById("site").value;
  const materiel = document.getElementById("materiel").value;
  const action1 = document.getElementById("action1").value;
  const action2 = document.getElementById("action2").value;
  const redacteur = document.getElementById("redacteur").value;

  if (!equipement || !description || !date || !site || !materiel || !redacteur) {
    alert("⚠️ Champs obligatoires manquants");
    return;
  }

  if (!confirm("✅ Confirmer l'envoi ?")) return;

  let baseUrl = "https://forms.office.com/Pages/ResponsePage.aspx?id=esFuUS-5i0OFlOEbb2vseRjkMUtrzTFJgkDRO6ovM4RUQzRENktIUTY4V0YwUFVVQ01QSlk5WkVPWC4u";

  let url = baseUrl
    + "&r6224cbff49d94b79a69654caa3241ddf=" + encodeURIComponent(equipement)
    + "&r936dbfbe7b3a4f0ba57f4406807e37a5=" + encodeURIComponent(description)
    + "&rb1e2f7df928f43beacbe59f537d8b09b=" + encodeURIComponent(date)
    + "&r3fedaea8875d40899833d017ba9ff9fa=" + encodeURIComponent(site)
    + "&r9ac54388070a43748ea2b5514ff712d8=" + encodeURIComponent(materiel)
    + "&ra23df662a36640e2912b5bed96b080ee=" + encodeURIComponent(action1)
    + "&rdd29c9cd9da649e8a41549e52d9f6374=" + encodeURIComponent(action2)
    + "&r38c32352ebca4f7e88f37c0de9bf0bf0=" + encodeURIComponent(redacteur);

  window.location.href = url;
}

</script>

</body>
</html>
