<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FDM Maintenance</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f4f6f8;
}

.container {
  width: 70%;
}

h2 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 5px;
}

.info {
  text-align: center;
  color: red;
  font-size: 12px;
}

.row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
}

.label {
  width: 15%;
  font-size: 14px;
  font-weight: bold;
}

.field {
  width: 85%;
  position: relative;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

textarea {
  min-height: 80px;
  resize: none;
}

.btn-main {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  font-size: 16px;
  background: #0078D7;
  color: white;
  border-radius: 10px;
  border: none;
}

.btn-group-horizontal {
  display: flex;
  gap: 6px;
}

.btn-group-horizontal button {
  flex: 1;
  padding: 12px;
}

.btn-group-horizontal button.active {
  background-color: #0078D7;
  color: white;
}

.dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid #ccc;
  max-height: 160px;
  overflow-y: auto;
  display: none;
}

.dropdown div {
  padding: 10px;
}

.dropdown div:hover {
  background: #e6f2ff;
}
</style>
</head>

<body>

<div class="container">

<h2>🔧 Fiches de Maintenance (TEST)</h2>
<p class="info">* obligatoires</p>

<div class="row">
  <div class="label">Equipement *</div>
  <div class="field">

    <input type="text" style="display:none">

    <input type="text" id="equipement"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false">

    <div id="equipementList" class="dropdown"></div>
  </div>
</div>

<div class="row">
  <div class="label">Description *</div>
  <div class="field">
    <textarea id="description"></textarea>
  </div>
</div>

<div class="row">
  <div class="label">Date *</div>
  <div class="field">
    <input type="date" id="date">
  </div>
</div>

<div class="row">
  <div class="label">Site *</div>
  <div class="field">

    <input type="text" style="display:none">

    <input type="text" id="site"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false">

    <div id="siteList" class="dropdown"></div>
  </div>
</div>

<div class="row">
  <div class="label">Matériel *</div>
  <div class="field">

    <div class="btn-group-horizontal">
      <button type="button" onclick="selectMateriel('Oui', this)">Oui</button>
      <button type="button" onclick="selectMateriel('Oui dégradé', this)">Dégradé</button>
      <button type="button" onclick="selectMateriel('Non', this)">Non</button>
    </div>

    <input type="hidden" id="materiel">
  </div>
</div>

<div class="row">
  <div class="label">Rédacteur *</div>
  <div class="field">
    <input type="text" id="redacteur">
  </div>
</div>

<button class="btn-main" onclick="envoyer()">✅ Envoyer</button>

</div>

<script>

// ✅ NORMALIZE
function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// ✅ FUZZY STABLE
function fuzzyMatch(search, text) {

  if (!search) return true;

  let i = 0;

  for (let j = 0; j < text.length; j++) {
    if (text[j] === search[i]) {
      i++;
    }
  }

  return i >= search.length - 1; // tolère 1 erreur
}


// ✅ HIGHLIGHT
function highlight(text, search) {

  if (!search) return text;

  const i = normalize(text).indexOf(normalize(search));

  if (i === -1) return text;

  return text.substring(0, i)
    + "<b>" + text.substring(i, i + search.length) + "</b>"
    + text.substring(i + search.length);
}

// ✅ GLOBALS
let equipements = [];
let sites = [];

// ✅ MATERIEL
function selectMateriel(val, el) {
  document.getElementById("materiel").value = val;

  document.querySelectorAll(".btn-group-horizontal button")
    .forEach(b => b.classList.remove("active"));

  el.classList.add("active");
}

// ✅ AUTOCOMPLETE
function createAutocomplete(inputId, listId, dataList) {

  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  input.addEventListener("focus", () => showList(""));
  input.addEventListener("input", () => showList(input.value));

   function showList(filter) {
  
    const val = normalize(filter);
  
    let results = dataList.map(item => ({
      original: item,
      normalized: normalize(item)
    }));
  
    // ✅ filtrage simple + fiable
    if (val.length > 0) {
      results = results.filter(item =>
        item.normalized.includes(val) || fuzzyMatch(val, item.normalized)
      );
    }
  
    // ✅ tri logique
    results.sort((a, b) => {
  
      const aStarts = a.normalized.startsWith(val);
      const bStarts = b.normalized.startsWith(val);
  
      if (aStarts && !bStarts) return -1;
      if (!aStarts && bStarts) return 1;
  
      return a.normalized.localeCompare(b.normalized);
    });
  
    results = results.slice(0, 50);
  
    if (results.length === 0) {
      list.innerHTML = "<div>Aucun résultat</div>";
    } else {
      list.innerHTML = results.map(item => `
        <div onclick="selectItem('${item.original.replace(/'/g, "\\'")}', '${inputId}', '${listId}')">
          ${highlight(item.original, filter)}
        </div>
      `).join("");
    }
  
    list.style.display = "block";
  }
}

// ✅ SELECT
function selectItem(val, inputId, listId) {
  document.getElementById(inputId).value = val;
  document.getElementById(listId).style.display = "none";
}

// ✅ LOAD DATA
Promise.all([
  fetch("equipements.json").then(r => r.json()),
  fetch("sites.json").then(r => r.json())
]).then(([e, s]) => {
  equipements = e;
  sites = s;
  createAutocomplete("equipement", "equipementList", equipements);
  createAutocomplete("site", "siteList", sites);
});

// ✅ CLOSE DROPDOWN
document.addEventListener("click", e => {
  if (!e.target.closest(".field")) {
    document.querySelectorAll(".dropdown")
      .forEach(d => d.style.display = "none");
  }
});

// ✅ DATE
window.onload = () => {
  document.getElementById("date").valueAsDate = new Date();
};

</script>

</body>
</html>
